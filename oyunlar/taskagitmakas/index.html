<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taş Kağıt Makas</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: white;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .choice {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
        }

        .choice img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem;
            transition: all 0.3s ease;
        }

        .choice:hover {
            transform: translateY(-10px);
        }

        .choice:hover img {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .score-container {
            background: rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
        }

        .score {
            font-size: 1.5rem;
            margin: 0.5rem 0;
        }

        #result {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 1.5rem 0;
            padding: 1rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.15);
        }

        .choice-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            padding: 0.3rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .home-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 1000;
        }

        .home-button:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        .buttons-container {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .game-button {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .game-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .choices {
                gap: 1rem;
            }

            .choice img {
                width: 100px;
                height: 100px;
                padding: 1.2rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            .score {
                font-size: 1.4rem;
            }

            #result {
                font-size: 1.2rem;
            }

            .home-button {
                padding: 1.2rem 2.2rem;
                font-size: 1.3rem;
            }

            .game-button {
                font-size: 1.2rem;
                padding: 1.2rem 2rem;
            }
        }
    </style>
</head>
<body>
    <button class="home-button" onclick="window.location.href='../../index.html'">
        <i class="material-icons">home</i>
        Ana Sayfa
    </button>
    <div class="game-container">
        <h1>Taş Kağıt Makas</h1>
        
        <div class="score-container">
            <div class="score">Oyuncu: <span id="playerScore">0</span></div>
            <div class="score">Bilgisayar: <span id="computerScore">0</span></div>
        </div>

        <div class="choices">
            <button class="choice" onclick="play('tas')">
                <img src="images/tas.png" alt="Taş">
                <span class="choice-label">Taş</span>
            </button>
            <button class="choice" onclick="play('kagit')">
                <img src="images/kagit.png" alt="Kağıt">
                <span class="choice-label">Kağıt</span>
            </button>
            <button class="choice" onclick="play('makas')">
                <img src="images/makas.png" alt="Makas">
                <span class="choice-label">Makas</span>
            </button>
        </div>

        <div id="result">Bir seçim yapın!</div>
        
        <div class="buttons-container">
            <button class="game-button" onclick="resetScore()">
                <i class="material-icons">refresh</i>
                Skoru Sıfırla
            </button>
        </div>
    </div>

    <script>
        let playerScore = 0;
        let computerScore = 0;

        function computerPlay() {
            const choices = ['tas', 'kagit', 'makas'];
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function getChoiceName(choice) {
            const names = {
                'tas': 'Taş',
                'kagit': 'Kağıt',
                'makas': 'Makas'
            };
            return names[choice];
        }

        function play(playerChoice) {
            const computerChoice = computerPlay();
            let result = '';

            if (playerChoice === computerChoice) {
                result = 'Berabere!';
            } else if (
                (playerChoice === 'tas' && computerChoice === 'makas') ||
                (playerChoice === 'kagit' && computerChoice === 'tas') ||
                (playerChoice === 'makas' && computerChoice === 'kagit')
            ) {
                playerScore++;
                result = 'Kazandınız! 🎉';
            } else {
                computerScore++;
                result = 'Bilgisayar kazandı! 🤖';
            }

            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
            document.getElementById('result').innerHTML = `
                ${result}<br>
                <small>Siz: ${getChoiceName(playerChoice)} - Bilgisayar: ${getChoiceName(computerChoice)}</small>
            `;

            // Seçimleri vurgula
            const choices = document.querySelectorAll('.choice');
            choices.forEach(choice => {
                choice.style.transform = 'translateY(0)';
                choice.querySelector('img').style.background = 'rgba(255, 255, 255, 0.2)';
            });

            // Kazanan seçimi vurgula
            const winningChoice = result === 'Kazandınız! 🎉' ? playerChoice : 
                                result === 'Bilgisayar kazandı! 🤖' ? computerChoice : null;
            
            if (winningChoice) {
                const winningButton = document.querySelector(`[onclick="play('${winningChoice}')"]`);
                winningButton.style.transform = 'translateY(-10px)';
                winningButton.querySelector('img').style.background = 'rgba(255, 255, 255, 0.4)';
            }
        }

        function resetScore() {
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('result').textContent = 'Bir seçim yapın!';
        }
    </script>
</body>
</html>
